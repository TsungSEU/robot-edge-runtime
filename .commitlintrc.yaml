# Conventional Commits configuration for Aurora Edge Runtime
# See https://www.conventionalcommits.org/

rules:
  type-enum:
    [2, 'always',
      [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]]
  type-case: [2, 'always', 'lower-case']
  type-empty: [2, 'never']
  subject-empty: [2, 'never']
  subject-case: [2, 'always', 'sentence-case']
  header-max-length: [2, 'always', 72]

# Aurora project-specific type mapping for CHANGELOG generation
types:
  feat: Features
  fix: Bug Fixes
  docs: Documentation
  style: Style
  refactor: Code Refactoring
  perf: Performance
  test: Tests
  build: Build System
  ci: Build System
  chore: Maintenance
  revert: Reverts
