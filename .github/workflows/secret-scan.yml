name: Secret guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  current-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Reject private keys
        run: |
          if git grep -nE 'BEGIN (RSA |EC |OPENSSH |DSA |)PRIVATE KEY' -- .; then
            echo "Private key material must not be committed."
            exit 1
          fi
      - name: Reject concrete runtime config
        run: |
          if git ls-files --error-unmatch config/app_config.json >/dev/null 2>&1; then
            echo "Use config/app_config.json.template and inject runtime secrets outside git."
            exit 1
          fi
      - name: Reject obvious hard-coded credential fields
        run: |
          if git grep -nE '"(password|secretAccessKey|accessKeyId)"[[:space:]]*:[[:space:]]*"[^$"]' -- ':(exclude)*.template' ':(exclude).github/workflows/secret-scan.yml'; then
            echo "Credential-looking values must come from environment placeholders or secrets."
            exit 1
          fi
