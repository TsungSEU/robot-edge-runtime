# AER 服务配置文件
# 此文件包含 AER 服务的运行时配置参数

# ===== 运行模式 =====
# 可选值: auto (自动驾驶), humanoid (人形机器人)
AER_MODE=humanoid

# ===== 配置文件路径 =====
# ONNX 模型文件路径
AER_MODEL_PATH=/home/xucong/caicAD/01datainfra/Aurora/aurora-planning-engine/models/humanoid_v2.onnx

# 配置文件路径
AER_CONFIG_PATH=/home/xucong/caicAD/01datainfra/Aurora/aurora-edge-runtime/config/planner_weights.yaml

# ===== 日志配置 =====
# 日志级别: 0=DEBUG1, 1=DEBUG, 2=INFO, 3=WARN, 4=ERROR
AER_LOG_LEVEL=2

# 日志文件路径
AER_LOG_FILE=/var/log/aer/aer.log

# ===== 数据采集配置 =====
# 数据存储根目录
AER_DATA_ROOT=/data/aer

# Rosbag2 存储路径
AER_BAG_PATH=/data/aer/bags

# ===== AWS S3 上传配置 =====
# 是否启用上传
AER_ENABLE_UPLOAD=true

# S3 Bucket 名称
AER_S3_BUCKET=caic-dataset

# ===== 可视化配置 =====
# 是否启用 RViz2 可视化
AER_ENABLE_VISUALIZATION=false

# 可视化坐标系 (odom, map, base_link)
AER_VIS_FRAME=odom

# ===== 性能配置 =====
# 最大采集周期数 (0 表示无限循环)
AER_MAX_CYCLES=0

# 每个周期后的等待时间（秒）
AER_CYCLE_WAIT=5

# ===== 调试选项 =====
# 是否启用调试输出
AER_DEBUG=false

# 是否启用 core dump
# AER_ENABLE_CORE_DUMP=true

# ===== CPU 绑核配置 =====
# CPU 亲和性配置，指定绑定的 CPU 核心 (从0开始)
# 格式: 单个核心(0), 多个不连续核心(0,2,4), 范围(0-3), 混合(0-3,6-7)
# 空值表示不绑核，由系统调度
AER_CPU_AFFINITY=0

# 示例配置:
#   AER_CPU_AFFINITY=0        # 仅绑定到 CPU 0
#   AER_CPU_AFFINITY=0,1      # 绑定到 CPU 0 和 1
#   AER_CPU_AFFINITY=0-3      # 绑定到 CPU 0-3 (4核)
#   AER_CPU_AFFINITY=          # 不绑核 (系统调度)
